<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="takao-icon-v5.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="高尾輸送">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — 高尾輸送サービス 管理システム</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif;
      background: linear-gradient(145deg, #e8f0ea 0%, #f5f8f4 50%, #eef4ef 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 6px 32px rgba(77, 122, 94, 0.14), 0 2px 8px rgba(0,0,0,0.06);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-img {
      width: 220px;
      height: auto;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 10px;
      display: block;
      line-height: 1;
    }

    .company-name {
      font-size: 13px;
      color: #7a9e86;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .system-name {
      font-size: 20px;
      font-weight: 700;
      color: #2d4a36;
      letter-spacing: 0.03em;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #4d7a5e;
      margin-bottom: 7px;
      letter-spacing: 0.03em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #c8d8cc;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #2d4a36;
      background: #f9fbfa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4d7a5e;
      box-shadow: 0 0 0 3px rgba(77, 122, 94, 0.12);
      background: white;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: #b4c8bc;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4d7a5e 0%, #3d6a4e 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
    }

    .btn-login:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-login:active:not(:disabled) {
      transform: scale(0.99);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-login .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading { padding-right: 48px; }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    .error-msg {
      display: none;
      background: #fdf0ef;
      border: 1px solid #f0b8b3;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 13px;
      color: #b5453a;
      line-height: 1.6;
    }

    .error-msg.visible { display: block; }

    .error-icon {
      font-size: 15px;
      margin-right: 6px;
    }

    footer {
      margin-top: 28px;
      font-size: 11px;
      color: #a0b8a8;
      text-align: center;
    }

    @media (max-width: 480px) {
      body { padding: 16px; overflow-x: hidden; }
      .login-card {
        padding: 28px 20px;
        border-radius: 16px;
      }
      .logo-icon { font-size: 40px; }
      .system-name { font-size: 17px; }
      input[type="email"],
      input[type="password"] {
        font-size: 16px; /* iOS: 16px以上でズームしない */
        padding: 13px 14px;
      }
      .btn-login { font-size: 15px; padding: 13px; }
    }
  </style>
</head>

  <footer>© 高尾輸送サービス 管理システム</footer>

  <script>
// ===== 高尾輸送サービス 管理システム 共通認証モジュール =====
// initAuth(['admin', 'staff'])  → 管理者・事務員どちらも可
// initAuth(['admin'])           → 管理者のみ

const AUTH_URL  = 'https://wxdyqkyqtizhtkwtpvru.supabase.co/auth/v1';
const REST_URL  = 'https://wxdyqkyqtizhtkwtpvru.supabase.co/rest/v1';
const ANON_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4ZHlxa3lxdGl6aHRrd3RwdnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NzYxODEsImV4cCI6MjA5OTQ1MjE4MX0.yVbClXBk2JVeglevsBLY5sH2_m2ybCf71u4i_YYWyHE';

const ROLE_LABEL = { admin: '管理者', staff: '事務員' };

/* ===================== セッション管理 ===================== */

function _saveSession(data) {
  const session = {
    access_token:  data.access_token,
    refresh_token: data.refresh_token,
    expires_at:    data.expires_at || (Math.floor(Date.now() / 1000) + (data.expires_in || 3600)),
    user_id:       data.user?.id || data.user_id,
    email:         data.user?.email || data.email,
  };
  sessionStorage.setItem('takao_session', JSON.stringify(session));
  return session;
}

function _getSession() {
  try { return JSON.parse(sessionStorage.getItem('takao_session')); }
  catch { return null; }
}

function _clearSession() {
  sessionStorage.removeItem('takao_session');
  sessionStorage.removeItem('takao_role');
  sessionStorage.removeItem('takao_name');
}

function _isExpired(session) {
  if (!session?.expires_at) return true;
  return Math.floor(Date.now() / 1000) > session.expires_at - 60;
}

function _authHeaders(token) {
  return {
    'Content-Type': 'application/json',
    'apikey': ANON_KEY,
    'Authorization': `Bearer ${token || ANON_KEY}`
  };
}

/* ===================== Supabase Auth API ===================== */

async function _refresh(session) {
  try {
    const res = await fetch(`${AUTH_URL}/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
      body: JSON.stringify({ refresh_token: session.refresh_token }),
    });
    if (!res.ok) return null;
    return _saveSession(await res.json());
  } catch { return null; }
}

async function _getRole(accessToken) {
  const cached = sessionStorage.getItem('takao_role');
  if (cached) return cached;
  try {
    const res = await fetch(`${REST_URL}/user_roles?select=role,display_name`, {
      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${accessToken}` },
    });
    if (!res.ok) return null;
    const data = await res.json();
    const row = data[0];
    if (!row) return null;
    sessionStorage.setItem('takao_role', row.role);
    if (row.display_name) sessionStorage.setItem('takao_name', row.display_name);
    return row.role;
  } catch { return null; }
}

/* ===================== 公開 API ===================== */

/**
 * ログイン（パスワード認証 → MFA確認）
 * 戻り値:
 *   { ok: false, error }
 *   { ok: true, role }              ← MFAなし or MFA未設定
 *   { ok: true, mfaRequired: true, factorId, tempToken } ← MFA必要
 */
async function signIn(email, password) {
  try {
    const res = await fetch(`${AUTH_URL}/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) return { ok: false, error: data.error_description || 'ログインに失敗しました' };

    const session = _saveSession(data);

    // MFA登録チェック（/auth/v1/user と /auth/v1/factors の両方を試す）
    try {
      let totpFactor = null;

      // 方法1: /auth/v1/user のfactorsフィールドで確認
      const uRes = await fetch(`${AUTH_URL}/user`, {
        headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
      });
      if (uRes.ok) {
        const userData = await uRes.json();
        const uf = Array.isArray(userData.factors) ? userData.factors : [];
        totpFactor = uf.find(f => f.factor_type === 'totp' && f.status === 'verified') || null;
      }

      // 方法2: /auth/v1/factors でも確認（方法1で見つからない場合のフォールバック）
      if (!totpFactor) {
        const fRes = await fetch(`${AUTH_URL}/factors`, {
          headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
        });
        if (fRes.ok) {
          const fData = await fRes.json();
          const ff = Array.isArray(fData) ? fData
                   : Array.isArray(fData?.factors) ? fData.factors : [];
          totpFactor = ff.find(f => f.factor_type === 'totp' && f.status === 'verified') || null;
        }
      }

      if (totpFactor) {
        // MFA必要 → セッションを一旦クリアし、仮トークンだけ返す
        _clearSession();
        return { ok: true, mfaRequired: true, factorId: totpFactor.id, tempToken: session.access_token };
      }
    } catch (_) {}

    // MFA不要
    const role = await _getRole(session.access_token);
    // ロール取得に失敗してもセッションは有効なので消去しない
    return { ok: true, role: role || null };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * MFA（TOTP）認証 — パスワード認証の続き
 */
async function signInMfa(factorId, code, tempToken) {
  try {
    const chRes = await fetch(`${AUTH_URL}/factors/${factorId}/challenge`, {
      method: 'POST',
      headers: _authHeaders(tempToken),
      body: JSON.stringify({})
    });
    if (!chRes.ok) return { ok: false, error: '認証チャレンジの作成に失敗しました' };
    const { id: challengeId } = await chRes.json();

    const vRes = await fetch(`${AUTH_URL}/factors/${factorId}/verify`, {
      method: 'POST',
      headers: _authHeaders(tempToken),
      body: JSON.stringify({ challenge_id: challengeId, code })
    });
    if (!vRes.ok) return { ok: false, error: 'コードが正しくありません。認証アプリを確認してください。' };

    const session = _saveSession(await vRes.json());
    const role = await _getRole(session.access_token);
    // ロール取得に失敗してもセッション（認証トークン）は有効なので消去しない
    // ポータル画面に進み、各管理画面でロールチェックが行われる
    return { ok: true, role: role || null };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * ログアウト
 */
async function signOut() {
  const session = _getSession();
  if (session?.access_token) {
    fetch(`${AUTH_URL}/logout`, {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` },
    }).catch(() => {});
  }
  _clearSession();
  window.location.href = 'login.html';
}

/**
 * パスワード変更（ログイン中のユーザー自身）
 */
async function changePassword(newPassword) {
  const session = _getSession();
  if (!session?.access_token) return { ok: false, error: 'セッションが無効です' };
  try {
    const res = await fetch(`${AUTH_URL}/user`, {
      method: 'PUT',
      headers: _authHeaders(session.access_token),
      body: JSON.stringify({ password: newPassword })
    });
    if (res.ok) return { ok: true };
    const d = await res.json();
    return { ok: false, error: d.msg || d.message || 'パスワード変更に失敗しました' };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * TOTP登録開始（QRコードURIを返す）
 */
async function enrollTotp() {
  let session = _getSession();
  if (!session?.access_token) return { ok: false, error: 'セッションが無効です' };

  // セッションの有効期限が近い場合はリフレッシュ
  if (_isExpired(session)) {
    session = await _refresh(session);
    if (!session) return { ok: false, error: 'セッションの更新に失敗しました。再ログインしてください。' };
  }

  try {
    // 未確認（unverified）のTOTPファクターのみ削除（確認済みのものは絶対に削除しない）
    const listRes = await fetch(`${AUTH_URL}/factors`, {
      headers: _authHeaders(session.access_token)
    });
    if (listRes.ok) {
      const factors = await listRes.json();
      if (Array.isArray(factors)) {
        // 確認済みファクターが既にある場合はエラーを返す
        const verified = factors.find(f => f.factor_type === 'totp' && f.status === 'verified');
        if (verified) {
          return { ok: false, error: '二段階認証はすでに設定済みです。一度「解除する」してから再設定してください。' };
        }
        // 未確認ファクターのみ削除
        for (const f of factors) {
          if (f.factor_type === 'totp' && f.status === 'unverified') {
            await fetch(`${AUTH_URL}/factors/${f.id}`, {
              method: 'DELETE',
              headers: _authHeaders(session.access_token)
            });
          }
        }
      }
    }

    const res = await fetch(`${AUTH_URL}/factors`, {
      method: 'POST',
      headers: _authHeaders(session.access_token),
      body: JSON.stringify({ factor_type: 'totp', friendly_name: '高尾輸送サービス', issuer: '高尾輸送サービス' })
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const msg = errData.msg || errData.message || errData.error_description || errData.code || `エラー(${res.status})`;
      return { ok: false, error: 'QRコードの生成に失敗しました: ' + msg };
    }
    const d = await res.json();
    return { ok: true, factorId: d.id, totpUri: d.totp?.uri, secret: d.totp?.secret };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * TOTP登録確認（初回コード検証）
 */
async function verifyTotpEnrollment(factorId, code) {
  const session = _getSession();
  if (!session?.access_token) return { ok: false, error: 'セッションが無効です' };
  try {
    const chRes = await fetch(`${AUTH_URL}/factors/${factorId}/challenge`, {
      method: 'POST', headers: _authHeaders(session.access_token), body: JSON.stringify({})
    });
    if (!chRes.ok) return { ok: false, error: 'チャレンジ作成に失敗しました' };
    const { id: challengeId } = await chRes.json();

    const vRes = await fetch(`${AUTH_URL}/factors/${factorId}/verify`, {
      method: 'POST',
      headers: _authHeaders(session.access_token),
      body: JSON.stringify({ challenge_id: challengeId, code })
    });
    if (!vRes.ok) return { ok: false, error: 'コードが正しくありません。もう一度お試しください。' };
    _saveSession(await vRes.json());
    return { ok: true };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * 登録済みTOTPファクター一覧
 */
async function getEnrolledFactors() {
  const session = _getSession();
  if (!session?.access_token) return [];
  try {
    const res = await fetch(`${AUTH_URL}/factors`, {
      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
    });
    if (!res.ok) return [];
    const factors = await res.json();
    return Array.isArray(factors) ? factors.filter(f => f.factor_type === 'totp' && f.status === 'verified') : [];
  } catch { return []; }
}

/**
 * TOTP解除
 */
async function unenrollTotp(factorId) {
  const session = _getSession();
  if (!session?.access_token) return { ok: false };
  try {
    const res = await fetch(`${AUTH_URL}/factors/${factorId}`, {
      method: 'DELETE',
      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
    });
    return { ok: res.ok };
  } catch { return { ok: false }; }
}

/**
 * 認証チェック（各ページのDOMContentLoaded前に呼ぶ）
 */
async function initAuth(allowedRoles) {
  document.documentElement.style.visibility = 'hidden';
  try {
    let session = _getSession();
    if (!session) { _redirectLogin(); return false; }
    if (_isExpired(session)) {
      session = await _refresh(session);
      if (!session) { _clearSession(); _redirectLogin(); return false; }
    }
    const role = await _getRole(session.access_token);
    if (!role || !allowedRoles.includes(role)) {
      _showDenied(role);
      document.documentElement.style.visibility = 'visible';
      return false;
    }
    _injectUserInfo(session.email, role);
    _injectModals();
    document.documentElement.style.visibility = 'visible';
    return true;
  } catch (err) {
    console.error('[auth.js] initAuth error:', err);
    document.documentElement.style.visibility = 'visible';
    return false;
  }
}

/* ===================== 内部ヘルパー ===================== */

function _redirectLogin() {
  document.documentElement.style.visibility = 'visible';
  window.location.href = 'login.html?redirect=' + encodeURIComponent(location.href);
}

function _showDenied(role) {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;
      background:#f5f8f4;font-family:'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif;">
      <div style="background:white;border-radius:18px;padding:44px 40px;text-align:center;
        box-shadow:0 4px 24px rgba(77,122,94,0.13);max-width:400px;">
        <div style="font-size:52px;margin-bottom:16px;">🔒</div>
        <h2 style="color:#b5453a;font-size:18px;margin-bottom:10px;">アクセス権限がありません</h2>
        <p style="color:#5c7066;font-size:13px;line-height:1.7;margin-bottom:28px;">
          この画面は表示できません。<br>権限については管理者にお問い合わせください。
        </p>
        <div style="display:flex;gap:10px;justify-content:center;">
          <a href="index.html" style="background:#4d7a5e;color:white;padding:10px 22px;
            border-radius:9px;text-decoration:none;font-size:13px;font-weight:700;">🏠 トップへ</a>
          <button onclick="signOut()" style="background:#eef7f1;color:#4d7a5e;border:1px solid #b4d4c0;
            padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;">
            ログアウト
          </button>
        </div>
      </div>
    </div>`;
}

function _injectUserInfo(email, role) {
  const header = document.querySelector('header');
  if (!header) return;

  const name = sessionStorage.getItem('takao_name') || email;
  const label = ROLE_LABEL[role] || role;
  const badgeColor = role === 'admin' ? '#9b7eb8' : '#6b9e7e';

  const menuId = '_takao_usermenu';
  const html = `
    <span style="display:inline-block;width:1px;height:18px;background:rgba(255,255,255,0.3);
      margin:0 4px;vertical-align:middle;"></span>
    <div style="position:relative;display:inline-block;">
      <button id="_takao_menubtn" onclick="_toggleUserMenu()" style="background:rgba(255,255,255,0.15);
        color:white;border:1px solid rgba(255,255,255,0.35);padding:5px 12px;border-radius:9px;
        font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;
        display:flex;align-items:center;gap:6px;">
        <span style="background:${badgeColor};padding:2px 7px;border-radius:10px;font-size:11px;">${label}</span>
        ${name} ▾
      </button>
      <div id="${menuId}" style="display:none;position:absolute;right:0;top:calc(100% + 6px);
        background:white;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);
        min-width:160px;z-index:9999;overflow:hidden;">
        <button onclick="_closeUserMenu();showPasswordChangeModal();" style="${_menuItemStyle()}">
          🔑 パスワード変更
        </button>
        <button onclick="_closeUserMenu();showTotpSetupModal();" style="${_menuItemStyle()}">
          🛡️ 二段階認証設定
        </button>
        <hr style="margin:0;border:none;border-top:1px solid #eee;">
        <button onclick="signOut()" style="${_menuItemStyle('danger')}">
          ログアウト
        </button>
      </div>
    </div>`;

  const divs = header.querySelectorAll(':scope > div');
  if (divs.length >= 2) {
    const navDiv = divs[divs.length - 1];
    navDiv.style.display = 'flex';
    navDiv.style.alignItems = 'center';
    navDiv.style.gap = '8px';
    navDiv.insertAdjacentHTML('beforeend', html);
  } else {
    header.style.display = 'flex';
    header.style.alignItems = 'center';
    header.style.justifyContent = 'space-between';
    header.style.flexWrap = 'wrap';
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
    div.innerHTML = html;
    header.appendChild(div);
  }

  // メニュー外クリックで閉じる
  document.addEventListener('click', e => {
    const btn = document.getElementById('_takao_menubtn');
    const menu = document.getElementById(menuId);
    if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
      menu.style.display = 'none';
    }
  });
}

function _menuItemStyle(type) {
  const base = 'width:100%;text-align:left;padding:10px 16px;border:none;background:none;font-size:13px;cursor:pointer;font-family:inherit;display:block;';
  if (type === 'danger') return base + 'color:#b5453a;';
  return base + 'color:#2d3b35;';
}

function _toggleUserMenu() {
  const menu = document.getElementById('_takao_usermenu');
  if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function _closeUserMenu() {
  const menu = document.getElementById('_takao_usermenu');
  if (menu) menu.style.display = 'none';
}

/* ===================== パスワード変更 ===================== */

function showPasswordChangeModal() {
  _injectModals();
  document.getElementById('_tm_pw_new').value = '';
  document.getElementById('_tm_pw_conf').value = '';
  document.getElementById('_tm_pw_err').style.display = 'none';
  document.getElementById('_tm_pw_ok').style.display = 'none';
  document.getElementById('_tm_pw').classList.add('open');
  setTimeout(() => document.getElementById('_tm_pw_new').focus(), 100);
}

function closePasswordChangeModal() {
  document.getElementById('_tm_pw').classList.remove('open');
}

async function _doChangePassword() {
  const np   = document.getElementById('_tm_pw_new').value;
  const conf = document.getElementById('_tm_pw_conf').value;
  const err  = document.getElementById('_tm_pw_err');
  const ok   = document.getElementById('_tm_pw_ok');
  const btn  = document.getElementById('_tm_pw_btn');
  err.style.display = 'none';
  ok.style.display = 'none';
  if (np.length < 8) { err.textContent = 'パスワードは8文字以上で設定してください'; err.style.display = 'block'; return; }
  if (np !== conf)   { err.textContent = 'パスワードが一致しません'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '変更中…';
  const result = await changePassword(np);
  btn.disabled = false; btn.textContent = '変更する';
  if (result.ok) {
    ok.style.display = 'block';
    document.getElementById('_tm_pw_new').value = '';
    document.getElementById('_tm_pw_conf').value = '';
    setTimeout(() => closePasswordChangeModal(), 2000);
  } else {
    err.textContent = result.error; err.style.display = 'block';
  }
}

/* ===================== 二段階認証設定 ===================== */

let _totpFactorId = null;

async function showTotpSetupModal() {
  _injectModals();
  _showTotpStep0();
  document.getElementById('_tm_totp_err').style.display = 'none';
  document.getElementById('_tm_totp_ok').style.display = 'none';
  document.getElementById('_tm_totp').classList.add('open');

  const status = document.getElementById('_tm_totp_status');
  const startBtn  = document.getElementById('_tm_totp_start_btn');
  const disableBtn = document.getElementById('_tm_totp_disable_btn');
  status.textContent = '状態を確認中...';
  startBtn.style.display = 'none';
  disableBtn.style.display = 'none';

  const factors = await getEnrolledFactors();
  if (factors.length > 0) {
    _totpFactorId = factors[0].id;
    status.textContent = '✅ 二段階認証は有効です。認証アプリが設定されています。';
    disableBtn.style.display = 'block';
  } else {
    status.textContent = '二段階認証は現在無効です。設定するとログイン時にアプリのコード入力が必要になります。';
    startBtn.style.display = 'block';
  }
}

function closeTotpSetupModal() {
  document.getElementById('_tm_totp').classList.remove('open');
}

function _showTotpStep0() {
  ['_tm_totp_s0','_tm_totp_s1','_tm_totp_s2'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === 0);
  });
}
function _showTotpStep1() {
  ['_tm_totp_s0','_tm_totp_s1','_tm_totp_s2'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === 1);
  });
}
function _showTotpStep2() {
  document.getElementById('_tm_totp_code').value = '';
  ['_tm_totp_s0','_tm_totp_s1','_tm_totp_s2'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === 2);
  });
  setTimeout(() => document.getElementById('_tm_totp_code').focus(), 100);
}

async function _startTotpSetup() {
  const startBtn = document.getElementById('_tm_totp_start_btn');
  const err = document.getElementById('_tm_totp_err');
  err.style.display = 'none';
  startBtn.disabled = true; startBtn.textContent = 'QRコード生成中…';

  const result = await enrollTotp();
  startBtn.disabled = false; startBtn.textContent = 'QRコードを表示して設定開始';
  if (!result.ok) { err.textContent = result.error; err.style.display = 'block'; return; }

  _totpFactorId = result.factorId;
  document.getElementById('_tm_totp_secret').textContent = result.secret || '';

  // QRコード描画
  const canvas = document.getElementById('_tm_qr_canvas');
  canvas.innerHTML = '';
  _loadQRLib(() => {
    new QRCode(canvas, { text: result.totpUri, width: 200, height: 200,
      colorDark: '#2d4a36', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  });

  _showTotpStep1();
}

async function _verifyTotpSetup() {
  const code = document.getElementById('_tm_totp_code').value.replace(/\D/g, '');
  const err  = document.getElementById('_tm_totp_err');
  const ok   = document.getElementById('_tm_totp_ok');
  const btn  = document.getElementById('_tm_totp_verify_btn');
  err.style.display = 'none';
  if (code.length !== 6) { err.textContent = '6桁のコードを入力してください'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '確認中…';
  const result = await verifyTotpEnrollment(_totpFactorId, code);
  btn.disabled = false; btn.textContent = '設定を完了する';
  if (result.ok) {
    ok.textContent = '✅ 二段階認証の設定が完了しました！次回ログインからコード入力が必要になります。';
    ok.style.display = 'block';
    _showTotpStep0();
    document.getElementById('_tm_totp_status').textContent = '✅ 二段階認証は有効です。認証アプリが設定されています。';
    document.getElementById('_tm_totp_start_btn').style.display = 'none';
    document.getElementById('_tm_totp_disable_btn').style.display = 'block';
  } else {
    err.textContent = result.error; err.style.display = 'block';
  }
}

async function _disableTotp() {
  if (!confirm('二段階認証を解除しますか？\nログイン時のコード入力が不要になります。')) return;
  const result = await unenrollTotp(_totpFactorId);
  const err = document.getElementById('_tm_totp_err');
  const ok  = document.getElementById('_tm_totp_ok');
  if (result.ok) {
    ok.textContent = '二段階認証を解除しました。';
    ok.style.display = 'block';
    document.getElementById('_tm_totp_status').textContent = '二段階認証は現在無効です。';
    document.getElementById('_tm_totp_start_btn').style.display = 'block';
    document.getElementById('_tm_totp_disable_btn').style.display = 'none';
  } else {
    err.textContent = '解除に失敗しました。'; err.style.display = 'block';
  }
}

function _loadQRLib(cb) {
  if (window.QRCode) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload = cb;
  document.head.appendChild(s);
}

<script>
    // ブラウザ保存済みの認証情報を自動補完
    if (window.PasswordCredential && navigator.credentials) {
      navigator.credentials.get({ password: true, mediation: 'optional' })
        .then(function(cred) {
          if (cred && cred.type === 'password') {
            document.getElementById('emailInput').value = cred.id;
            document.getElementById('passwordInput').value = cred.password;
          }
        }).catch(function() {});
    }

    document.getElementById('passwordInput').addEventListener('input', function() {
      document.getElementById('errorMsg').classList.remove('visible');
    });
    document.getElementById('emailInput').addEventListener('input', function() {
      document.getElementById('errorMsg').classList.remove('visible');
    });

    var _mfaFactorId = null;
    var _mfaTempToken = null;
    var _loginEmail = '';
    var _loginPassword = '';

    function backToStep1() {
      document.getElementById('step2-card').style.display = 'none';
      document.getElementById('step1-card').style.display = 'block';
      document.getElementById('mfaErrorMsg').classList.remove('visible');
      document.getElementById('totpCode').value = '';
      _mfaFactorId = null;
      _mfaTempToken = null;
    }

    async function handleLogin(e) {
      e.preventDefault();

      var email    = document.getElementById('emailInput').value.trim();
      var password = document.getElementById('passwordInput').value;
      var btn      = document.getElementById('loginBtn');
      var errBox   = document.getElementById('errorMsg');
      var errText  = document.getElementById('errorText');

      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = 'ログイン中…';
      btn.insertAdjacentHTML('beforeend', '<span class="spinner"></span>');
      errBox.classList.remove('visible');

      var result = await signIn(email, password);

      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = 'ログイン';
      btn.insertAdjacentHTML('beforeend', '<span class="spinner"></span>');

      if (result.ok && result.mfaRequired) {
        _mfaFactorId  = result.factorId;
        _mfaTempToken = result.tempToken;
        _loginEmail   = email;
        _loginPassword = password;
        document.getElementById('step1-card').style.display = 'none';
        document.getElementById('step2-card').style.display = 'block';
        setTimeout(function() { document.getElementById('totpCode').focus(); }, 100);
      } else if (result.ok) {
        if (window.PasswordCredential) {
          try {
            var cred = new PasswordCredential({ id: email, password: password });
            await navigator.credentials.store(cred);
          } catch(e_) {}
        }
        var params   = new URLSearchParams(location.search);
        var redirect = params.get('redirect');
        if (redirect && (redirect.startsWith('/') || redirect.startsWith(location.origin))) {
          window.location.href = redirect;
        } else {
          window.location.href = 'index.html';
        }
      } else {
        errText.textContent = result.error || 'ログインに失敗しました';
        errBox.classList.add('visible');
      }
    }

    async function handleMfa(e) {
      e.preventDefault();
      var code    = document.getElementById('totpCode').value.replace(/[^0-9]/g, '');
      var btn     = document.getElementById('mfaBtn');
      var errBox  = document.getElementById('mfaErrorMsg');
      var errText = document.getElementById('mfaErrorText');

      if (code.length !== 6) {
        errText.textContent = '6桁のコードを入力してください';
        errBox.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = '確認中…';
      btn.insertAdjacentHTML('beforeend', '<span class="spinner"></span>');
      errBox.classList.remove('visible');

      var result = await signInMfa(_mfaFactorId, code, _mfaTempToken);

      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = '確認';
      btn.insertAdjacentHTML('beforeend', '<span class="spinner"></span>');

      if (result.ok) {
        if (window.PasswordCredential && _loginPassword) {
          try {
            var cred = new PasswordCredential({ id: _loginEmail, password: _loginPassword });
            await navigator.credentials.store(cred);
          } catch(e_) {}
        }
        var params   = new URLSearchParams(location.search);
        var redirect = params.get('redirect');
        if (redirect && (redirect.startsWith('/') || redirect.startsWith(location.origin))) {
          window.location.href = redirect;
        } else {
          window.location.href = 'index.html';
        }
      } else {
        errText.textContent = result.error || '認証に失敗しました';
        errBox.classList.add('visible');
        document.getElementById('totpCode').value = '';
        setTimeout(function() { document.getElementById('totpCode').focus(); }, 100);
      }
    }
  </script>
