<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="takao-icon-v5.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="高尾輸送">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>添乗員配置管理システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; background: #f5f8f4; color: #333; }

  header {
    background: #ffffff;
    color: #2d4a38;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    border-bottom: 3px solid #4d7a5e;
  }
  header > div:first-child { display: flex; align-items: center; gap: 14px; }
  header h1 { font-size: 18px; font-weight: bold; color: #2d4a38; white-space: nowrap; }
  .header-logo { height: 34px; width: auto; display: block; }
  a.logo-link { display: block; line-height: 0; flex-shrink: 0; }
  header .subtitle { font-size: 12px; color: #5c7a6e; }
  header a.hlink {
    color: #4d7a5e; font-size: 13px; text-decoration: none;
    border: 1px solid rgba(77,122,94,0.45); padding: 5px 12px; border-radius: 8px; margin-left: 6px;
  }
  header a.hlink:hover { background: rgba(77,122,94,0.08); }

  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

  .date-bar {
    background: white;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    flex-wrap: wrap;
  }
  .date-bar label { font-weight: bold; font-size: 14px; color: #4d7a5e; }
  .date-bar input[type=date] {
    padding: 8px 12px;
    border: 2px solid #4d7a5e;
    border-radius: 9px;
    font-size: 16px;
    cursor: pointer;
  }

  /* 参照日ライン */
  .date-bar-sep {
    width: 100%; height: 0;
    border-top: 1px dashed #c8d8cc;
    margin: 4px 0;
  }
  .date-bar .ref-label {
    font-size: 12px; color: #7fa88a; font-weight: bold;
  }
  .date-bar input.ref-date {
    border: 1.5px solid #b4d4c0 !important;
    font-size: 14px !important;
    padding: 6px 10px !important;
    color: #5c7066;
  }
  /* 当日インジケーター */
  .date-indicator {
    font-size: 12px; color: #5c7066; padding: 3px 10px;
    background: #eef7f1; border-radius: 20px; border: 1px solid #b4d4c0;
  }
  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #4d7a5e; color: white; }
  .btn-success { background: #2e7d52; color: white; }
  .btn-notify { background: #d35400; color: white; }
  .btn-small { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: #c0392b; color: white; }
  .btn-add { background: #6b9e7e; color: white; }
  .btn-edit { background: #9b7eb8; color: white; }

  .panel {
    background: white;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .panel h2 {
    font-size: 15px;
    font-weight: bold;
    color: #4d7a5e;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e4f0e8;
  }

  /* 配置入力テーブル */
  .assignment-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .assignment-table th {
    background: #e4f0e8;
    padding: 8px 10px;
    text-align: center;
    border: 1px solid #b4d4c0;
    font-weight: bold;
    color: #4d7a5e;
    white-space: nowrap;
  }
  .assignment-table td {
    padding: 6px 8px;
    border: 1px solid #c8d8cc;
    vertical-align: middle;
  }
  .assignment-table tr:nth-child(even) { background: #f8fbf9; }
  .assignment-table tr:hover { background: #eaf5ef; }

  select, input[type=text] {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid #aaa;
    border-radius: 7px;
    font-size: 13px;
    background: white;
  }
  select:focus, input[type=text]:focus {
    outline: none;
    border-color: #4d7a5e;
    box-shadow: 0 0 0 2px rgba(77,122,94,0.15);
  }

  .row-num {
    text-align: center;
    color: #666;
    font-size: 12px;
    width: 30px;
  }
  .col-course { min-width: 160px; }
  .col-staff { min-width: 130px; }
  .col-check { text-align: center; width: 80px; }
  .col-memo { min-width: 120px; }
  .col-action { text-align: center; width: 60px; }

  /* 添乗員マスター管理 */
  .staff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .staff-card {
    border: 1px solid #c8d8cc;
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fdfffe;
  }
  .staff-card .name { font-weight: bold; font-size: 14px; }
  .staff-card .email { font-size: 11px; color: #666; margin-top: 2px; }

  .add-staff-form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .add-staff-form .field { display: flex; flex-direction: column; gap: 4px; }
  .add-staff-form label { font-size: 12px; font-weight: bold; color: #555; }
  .add-staff-form input {
    padding: 7px 10px;
    border: 1px solid #aaa;
    border-radius: 8px;
    font-size: 13px;
    width: 200px;
  }

  /* 通知プレビュー */
  .notify-preview {
    background: #fef9e7;
    border: 1px solid #f0d080;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
  }

  /* ステータス */
  .status-bar {
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .status-bar.success { background: #d5f0e3; color: #2e7d52; border: 1px solid #95d0aa; display: block; }
  .status-bar.error { background: #fadbd8; color: #c0392b; border: 1px solid #f1948a; display: block; }
  .status-bar.info { background: #e4f0e8; color: #4d7a5e; border: 1px solid #b4d4c0; display: block; }

  .action-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 14px;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: bold;
  }
  .badge-blue { background: #e4f0e8; color: #4d7a5e; }
  .badge-green { background: #d5f0e3; color: #2e7d52; }

  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 2px solid #e4f0e8;
    padding-bottom: 0;
  }
  .tab {
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 9px 6px 0 0;
    font-size: 13px;
    font-weight: bold;
    color: #666;
    background: #eef7f1;
    border: 1px solid #b4d4c0;
    border-bottom: none;
    transition: all 0.2s;
    margin-bottom: -2px;
  }
  .tab.active { background: white; color: #4d7a5e; border-color: #e4f0e8; border-bottom: 2px solid white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  @media (max-width: 700px) {
    .assignment-table { font-size: 11px; }
    .assignment-table th, .assignment-table td { padding: 4px 5px; }
    .col-course { min-width: 120px; }
    .col-staff { min-width: 100px; }
  }

  /* === Sage Green Theme Refinements === */
  :root {
    --sage: #6b9e7e;
    --sage-dark: #4d7a5e;
    --sage-tint: #e4f0e8;
    --sage-light: #f0f7f3;
    --bg: #f5f8f4;
    --text: #2d3b35;
    --text-soft: #5c7066;
    --border: #c8d8cc;
  }
  .btn { border-radius: 9px !important; }
  .btn-primary  { background: #4d7a5e !important; }
  .btn-add      { background: #6b9e7e !important; }
  .btn-success  { background: #2e7d52 !important; }
  .btn-edit     { background: #9b7eb8 !important; }
  .btn-danger   { background: #b5453a !important; }
  .btn-notify   { background: #c17f3e !important; }
  .btn-dl       { background: #5a9e7a !important; }
  .btn-gray     { background: #8aaa94 !important; }
  .btn:hover    { opacity: 0.88 !important; }

  /* tenjo extra */
  header { background: #ffffff !important; border-bottom: 3px solid #4d7a5e !important; }
  .panel h2 { color: #4d7a5e !important; border-bottom-color: #d0e8d8 !important; }
  .date-bar label { color: #4d7a5e !important; }
  .date-bar input[type=date] { border-color: #6b9e7e !important; border-radius: 9px !important; }
  .assignment-table th { background: #d8eee0 !important; color: #4d7a5e !important; border-color: #b4d4c0 !important; }
  select:focus, input[type=text]:focus, input:focus { border-color: #6b9e7e !important; box-shadow: 0 0 0 2px rgba(107,158,126,0.2) !important; }
  .tab { background: #eef7f1 !important; border-color: #b4d4c0 !important; color: #5c7066 !important; }
  .tab.active { background: white !important; color: #4d7a5e !important; border-bottom-color: white !important; }
  .tab-bar { border-bottom-color: #d0e8d8 !important; }
  .status-bar.info { background: #e4f0e8 !important; color: #4d7a5e !important; border-color: #b4d4c0 !important; }
  .notify-preview { background: #fdf9ef !important; border-color: #e8d8a0 !important; }
  .badge-blue { background: #e4f0e8 !important; color: #4d7a5e !important; }

  /* ===== iOS / モバイル対応 ===== */
  @media (max-width: 768px) {
    body { overflow-x: hidden; }
    header {
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px;
    }
    header h1 { font-size: 15px; }
.header-logo { height: 26px; }
    header .subtitle { font-size: 11px; }
    header > div:last-child {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    header > div:last-child a {
      font-size: 11px !important;
      padding: 4px 8px !important;
    }
    .container { padding: 10px 12px; }
    .date-bar {
      padding: 10px 12px;
      gap: 8px;
    }
    .date-bar label { font-size: 13px; }
    .date-bar input[type=date] {
      font-size: 14px;
      padding: 6px 8px;
    }
    .ref-label { font-size: 11px !important; }
    .tab-bar {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap;
    }
    .tab {
      padding: 7px 10px;
      font-size: 12px;
      white-space: nowrap;
    }
    .btn { padding: 8px 12px; font-size: 13px; }
    .btn-small { padding: 5px 8px; font-size: 11px; }
    .panel { padding: 12px; }
    .panel h2 { font-size: 14px; }
    .action-bar { gap: 6px; }
    .staff-grid { grid-template-columns: 1fr; }
    .staff-card { flex-wrap: wrap; gap: 6px; }
    .add-staff-form { flex-direction: column; }
    .add-staff-form input { width: 100%; }
    select, input[type=text] { font-size: 16px; } /* iOS: ズーム防止 */
    .assignment-table { font-size: 12px; }
    .assignment-table th, .assignment-table td { padding: 5px 6px; }
  }

</style>
</head>
<body>

<header>
  <div>
    <a href="index.html" class="logo-link"><img src="logo.png" alt="TAKAO" class="header-logo"></a>
    <h1>🚌 添乗員配置管理</h1>
  </div>
  <div style="display:flex; gap:8px;">
    <a href="master.html" class="hlink">📂 マスター管理</a>
    <a href="index.html" class="hlink">🏠 トップ</a>
  </div>
</header>

<div class="container">

  <!-- タブ -->
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('tab-assign')">📋 日次配置入力</div>
    <div class="tab" onclick="switchTab('tab-staff')">👤 添乗員マスター</div>
    <div class="tab" onclick="switchTab('tab-notify')">📧 通知送信</div>
  </div>

  <!-- ========== 日次配置入力 ========== -->
  <div id="tab-assign" class="tab-content active">
    <div class="date-bar">
      <!-- メイン：配置日（翌日デフォルト・保存先） -->
      <label>📅 配置日（保存先）：</label>
      <input type="date" id="workDate" />
      <button class="btn btn-primary" onclick="loadAssignments()"
        title="この配置日としてすでに保存されているデータを再読み込みします">↩ 保存済みを再読み込み</button>
      <span class="date-indicator" id="todayLabel"></span>

      <!-- 区切り -->
      <div class="date-bar-sep"></div>

      <!-- サブ：前日などをテンプレートとして読み込む（今日デフォルト） -->
      <span class="ref-label">📂 前日などを読み込んでテンプレートにする：</span>
      <input type="date" id="refDate" class="ref-date" />
      <button class="btn btn-small" style="background:#9b7eb8;color:white;font-weight:bold;"
        onclick="loadFromRef()"
        title="この日の配置を配置表に展開します。配置日（保存先）は変わりません。">この日を読み込む</button>
    </div>

    <div class="panel">
      <h2>配置表</h2>
      <div style="overflow-x:auto;">
        <table class="assignment-table" id="assignTable">
          <thead>
            <tr>
              <th class="row-num">No.</th>
              <th class="col-course">学校名</th>
              <th class="col-course">コース名</th>
              <th class="col-staff">登校便 添乗員</th>
              <th class="col-staff">下校便 添乗員</th>
              <th class="col-check">中間業務</th>
              <th class="col-staff">中間担当</th>
              <th class="col-memo">メモ</th>
              <th class="col-action">削除</th>
            </tr>
          </thead>
          <tbody id="assignBody">
            <!-- 行はJSで生成 -->
          </tbody>
        </table>
      </div>

      <div class="action-bar">
        <button class="btn btn-success" onclick="saveAssignments()">💾 配置を保存</button>
        <button class="btn btn-small" style="background:#2e7d52;color:white;" onclick="exportAssignCSV()">📥 CSVダウンロード</button>
        <div style="width:1px; height:28px; background:#c8d8cc; margin:0 4px; align-self:center;"></div>
        <button class="btn" style="background:#a8c5b0; color:#2d3b35; font-weight:700;"
          onclick="addRow()" title="配置表の末尾に新しい行を追加します">＋ 行を追加</button>
        <span id="saveStatus" class="status-bar"></span>
      </div>
    </div>
  </div>

  <!-- ========== 添乗員マスター ========== -->
  <div id="tab-staff" class="tab-content">
    <div class="panel">
      <h2>登録済み添乗員</h2>
      <div class="staff-grid" id="staffGrid">
        <div style="color:#999; font-size:13px;">読み込み中...</div>
      </div>
    </div>

    <div class="panel">
      <h2>添乗員を追加</h2>
      <div class="add-staff-form">
        <div class="field">
          <label>氏名 *</label>
          <input type="text" id="newName" placeholder="例：山田 太郎" />
        </div>
        <div class="field">
          <label>メールアドレス</label>
          <input type="text" id="newEmail" placeholder="例：yamada@example.com" />
        </div>
        <button class="btn btn-add" onclick="addStaff()">追加する</button>
      </div>
      <div id="staffStatus" class="status-bar" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- ========== 通知送信 ========== -->
  <div id="tab-notify" class="tab-content">
    <div class="date-bar">
      <label>📅 通知対象日：</label>
      <input type="date" id="notifyDate" />
      <button class="btn btn-primary" onclick="previewNotify()">プレビューを表示</button>
    </div>

    <div class="panel" id="notifyPanel" style="display:none;">
      <h2>通知内容プレビュー</h2>
      <div id="notifyList"></div>
      <div class="action-bar" style="margin-top:16px;">
        <button class="btn btn-notify" onclick="sendAllNotify()">📧 全員にメール通知を送る</button>
        <span style="font-size:12px; color:#666;">※メールクライアントが開きます（一人ずつ確認して送信してください）</span>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ========== Supabase設定 ==========
const SUPABASE_URL = 'https://wxdyqkyqtizhtkwtpvru.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4ZHlxa3lxdGl6aHRrd3RwdnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NzYxODEsImV4cCI6MjA5OTQ1MjE4MX0.yVbClXBk2JVeglevsBLY5sH2_m2ybCf71u4i_YYWyHE';

// 日報フォームのURL（GitHub Pages）
const NIPPO_FORM_URL = 'https://yh-git320.github.io/-/nippo.html';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// ========== グローバルデータ ==========
let staffList = [];    // [{id, name, email}, ...]
let courseList = [];   // [{id, prefecture, school_name, course_name}, ...]
let assignRows = [];   // 現在の配置行データ

// ローカル日付文字列を返す（タイムゾーン対応）
function localDateStr(d) {
  const dt = d || new Date();
  return dt.getFullYear() + '-' +
    String(dt.getMonth() + 1).padStart(2, '0') + '-' +
    String(dt.getDate()).padStart(2, '0');
}

// ========== 初期化 ==========
document.addEventListener('DOMContentLoaded', async () => {
  const authorized = await initAuth(['admin', 'staff']);
  if (!authorized) return;

  const now = new Date();
  const today = localDateStr(now);

  // 翌日を配置日のデフォルトに設定
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = localDateStr(tomorrow);
  document.getElementById('workDate').value = tomorrowStr;
  document.getElementById('notifyDate').value = tomorrowStr;

  // 別日参照は今日をデフォルトに
  document.getElementById('refDate').value = today;

  // 当日表示ラベル
  const ymd = today.replace(/-/g, '/');
  document.getElementById('todayLabel').textContent = `本日 ${ymd}`;

  await Promise.all([loadStaff(), loadCourses()]);

  // 翌日の配置を自動読み込み（なければ空行1行）
  await loadAssignments();
});

// ========== データ読み込み ==========
async function loadStaff() {
  // 「添乗員」業務種別のIDを取得
  const jtRes = await fetch(`${SUPABASE_URL}/rest/v1/job_types?name=eq.添乗員&select=id&active=eq.true`, { headers });
  const jtData = await jtRes.json();
  const tenjoTypeId = jtData[0]?.id;

  // 全従業員を取得
  const allRes = await fetch(`${SUPABASE_URL}/rest/v1/staff?active=eq.true&order=name`, { headers });
  const allStaff = await allRes.json();

  if (tenjoTypeId) {
    // 添乗員役割を持つ従業員IDを取得
    const ejRes = await fetch(`${SUPABASE_URL}/rest/v1/employee_job_types?job_type_id=eq.${tenjoTypeId}&select=employee_id`, { headers });
    const ejData = await ejRes.json();
    const tenjoIds = new Set(ejData.map(e => e.employee_id));
    staffList = allStaff.filter(s => tenjoIds.has(s.id));
  } else {
    // 業務マスタ未設定の場合は全員表示
    staffList = allStaff;
  }
  renderStaffGrid();
}

async function loadCourses() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/courses?active=eq.true&order=prefecture,school_name,course_name`, { headers });
  courseList = await res.json();
}

// ========== タブ切り替え ==========
function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  // タブボタン
  const tabs = document.querySelectorAll('.tab');
  const ids = ['tab-assign', 'tab-staff', 'tab-notify'];
  tabs[ids.indexOf(tabId)].classList.add('active');
}

// ========== 配置行の操作 ==========
function staffOptions(selectedId) {
  let opts = '<option value="">（未定）</option>';
  staffList.forEach(s => {
    const sel = s.id == selectedId ? 'selected' : '';
    opts += `<option value="${s.id}" ${sel}>${s.name}</option>`;
  });
  return opts;
}

function schoolOptions(selectedSchool) {
  // 学校名の重複除去
  const schools = [...new Set(courseList.map(c => c.school_name))];
  let opts = '<option value="">学校を選択</option>';
  schools.forEach(s => {
    const sel = s === selectedSchool ? 'selected' : '';
    opts += `<option value="${s}" ${sel}>${s}</option>`;
  });
  return opts;
}

function courseOptions(schoolName, selectedCourseId) {
  const filtered = courseList.filter(c => c.school_name === schoolName);
  let opts = '<option value="">コースを選択</option>';
  filtered.forEach(c => {
    const sel = c.id == selectedCourseId ? 'selected' : '';
    opts += `<option value="${c.id}" ${sel}>${c.course_name}</option>`;
  });
  return opts;
}

function addRow(data = {}) {
  const tbody = document.getElementById('assignBody');
  const rowIndex = tbody.rows.length + 1;
  const tr = document.createElement('tr');
  tr.dataset.assignId = data.id || '';

  tr.innerHTML = `
    <td class="row-num">${rowIndex}</td>
    <td class="col-course">
      <select onchange="updateCourseDropdown(this)">
        ${schoolOptions(data.school_name || '')}
      </select>
    </td>
    <td class="col-course">
      <select class="course-sel">
        ${courseOptions(data.school_name || '', data.course_id || '')}
      </select>
    </td>
    <td class="col-staff">
      <select class="tokou-sel">
        ${staffOptions(data.tokou_staff_id || '')}
      </select>
    </td>
    <td class="col-staff">
      <select class="gekou-sel">
        ${staffOptions(data.gekou_staff_id || '')}
      </select>
    </td>
    <td class="col-check">
      <input type="checkbox" class="chukan-check" ${data.chukan_ari ? 'checked' : ''}
             onchange="toggleChukanStaff(this)" />
    </td>
    <td class="col-staff">
      <select class="chukan-sel" ${!data.chukan_ari ? 'disabled style="opacity:0.4"' : ''}>
        ${staffOptions(data.chukan_staff_id || '')}
      </select>
    </td>
    <td class="col-memo">
      <input type="text" class="memo-input" value="${data.memo || ''}" placeholder="備考" />
    </td>
    <td class="col-action">
      <button class="btn btn-danger btn-small" onclick="removeRow(this)">✕</button>
    </td>
  `;
  tbody.appendChild(tr);
  renumberRows();
}

function removeRow(btn) {
  btn.closest('tr').remove();
  renumberRows();
}

function renumberRows() {
  document.querySelectorAll('#assignBody tr').forEach((tr, i) => {
    tr.querySelector('.row-num').textContent = i + 1;
  });
}

function updateCourseDropdown(schoolSel) {
  const tr = schoolSel.closest('tr');
  const courseSel = tr.querySelector('.course-sel');
  courseSel.innerHTML = courseOptions(schoolSel.value, '');
}

function toggleChukanStaff(checkbox) {
  const tr = checkbox.closest('tr');
  const sel = tr.querySelector('.chukan-sel');
  sel.disabled = !checkbox.checked;
  sel.style.opacity = checkbox.checked ? '1' : '0.4';
}

// ========== 配置読み込み ==========
// 別日参照：配置日は変えず、指定日のデータをテンプレートとして読み込む
async function loadFromRef() {
  const ref = document.getElementById('refDate').value;
  if (!ref) { alert('参照する日付を選択してください'); return; }
  const workDate = document.getElementById('workDate').value;
  // 配置日（保存先）はそのままにして、参照日のデータだけ展開する
  await loadAssignmentsFromDate(ref, true);
  // 読み込み後、配置日を元に戻す（念のため）
  document.getElementById('workDate').value = workDate;
}

// 配置日の保存済みデータを再読み込み
async function loadAssignments() {
  const date = document.getElementById('workDate').value;
  if (!date) return;
  await loadAssignmentsFromDate(date, false);
}

// 指定日のデータを配置表に展開する共通処理
// asTemplate=true のとき：DBのIDを引き継がない（新規行として展開）
async function loadAssignmentsFromDate(date, asTemplate) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/assignments?work_date=eq.${date}&order=id`,
    { headers }
  );
  const data = await res.json();

  const courseMap = {};
  courseList.forEach(c => { courseMap[c.id] = c; });

  document.getElementById('assignBody').innerHTML = '';

  if (data.length === 0) {
    addRow();
    if (asTemplate) {
      showStatus('saveStatus', 'info',
        `${date} の配置データはありません。空の行を追加しました。`);
    }
  } else {
    data.forEach(row => {
      const course = courseMap[row.course_id] || {};
      addRow({
        // テンプレート読み込み時はIDを持たせない（保存時に新規INSERT）
        id: asTemplate ? null : row.id,
        school_name: course.school_name || '',
        course_id: row.course_id,
        tokou_staff_id: row.tokou_staff_id,
        gekou_staff_id: row.gekou_staff_id,
        chukan_ari: row.chukan_ari,
        chukan_staff_id: row.chukan_staff_id,
        memo: row.memo || ''
      });
    });
    if (asTemplate) {
      showStatus('saveStatus', 'info',
        `${date} の配置（${data.length}件）を読み込みました。差分を修正して「配置を保存」してください。`);
    }
  }
}

// ========== 配置保存 ==========
async function saveAssignments() {
  const date = document.getElementById('workDate').value;
  if (!date) {
    showStatus('saveStatus', 'error', '日付を選択してください');
    return;
  }

  const rows = document.querySelectorAll('#assignBody tr');
  const toSave = [];

  rows.forEach(tr => {
    const courseId = tr.querySelector('.course-sel').value;
    if (!courseId) return; // コース未選択は無視

    toSave.push({
      work_date: date,
      course_id: parseInt(courseId),
      tokou_staff_id: tr.querySelector('.tokou-sel').value ? parseInt(tr.querySelector('.tokou-sel').value) : null,
      gekou_staff_id: tr.querySelector('.gekou-sel').value ? parseInt(tr.querySelector('.gekou-sel').value) : null,
      chukan_ari: tr.querySelector('.chukan-check').checked,
      chukan_staff_id: tr.querySelector('.chukan-sel').value && tr.querySelector('.chukan-check').checked
        ? parseInt(tr.querySelector('.chukan-sel').value) : null,
      memo: tr.querySelector('.memo-input').value || null
    });
  });

  if (toSave.length === 0) {
    showStatus('saveStatus', 'error', 'コースが1件も選択されていません');
    return;
  }

  // まず当日分を削除してから再INSERT（上書き保存）
  showStatus('saveStatus', 'info', '保存中...');

  const delRes = await fetch(
    `${SUPABASE_URL}/rest/v1/assignments?work_date=eq.${date}`,
    { method: 'DELETE', headers }
  );

  const insRes = await fetch(
    `${SUPABASE_URL}/rest/v1/assignments`,
    { method: 'POST', headers, body: JSON.stringify(toSave) }
  );

  if (insRes.ok) {
    showStatus('saveStatus', 'success', `✅ ${toSave.length}件の配置を保存しました`);
  } else {
    const err = await insRes.text();
    showStatus('saveStatus', 'error', '保存に失敗しました: ' + err);
  }
}

  if (staffList.length === 0) {
    grid.innerHTML = '<div style="color:#999; font-size:13px;">添乗員が登録されていません</div>';
    return;

  grid.innerHTML = staffList.map(s => `

      <div style="flex:1; min-width:0;">
        <div class="name">${s.name}</div>
        <div class="email">${s.email || '（メール未登録）'}</div>
      </div>
      <div style="display:flex; gap:6px; flex-shrink:0;">
        <button class="btn btn-edit btn-small" onclick="startEditStaff(${s.id})">編集</button>
        <button class="btn btn-danger btn-small" onclick="deleteStaff(${s.id}, '${s.name}')">削除</button>
      </div>

function startEditStaff(id) {
  const s = staffList.find(x => x.id === id);
  if (!s) return;
  const card = document.getElementById(`staff-card-${id}`);
  card.innerHTML = `
    <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
      <input type="text" id="edit-name-${id}" value="${s.name}" placeholder="氏名" style="font-size:13px; padding:5px 8px;" />
      <input type="text" id="edit-email-${id}" value="${s.email || ''}" placeholder="メールアドレス" style="font-size:13px; padding:5px 8px;" />
    </div>
    <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0; margin-left:8px;">
      <button class="btn btn-success btn-small" onclick="saveEditStaff(${id})">保存</button>
      <button class="btn btn-small" style="background:#aaa; color:white;" onclick="renderStaffGrid()">取消</button>
    </div>
  `;
}

async function saveEditStaff(id) {
  const name = document.getElementById(`edit-name-${id}`).value.trim();
  const email = document.getElementById(`edit-email-${id}`).value.trim();

  if (!name) {
    showStatus('staffStatus', 'error', '氏名を入力してください');
    return;
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/staff?id=eq.${id}`, {
    method: 'PATCH',
    headers,
    body: JSON.stringify({ name, email: email || null })
  });

  if (res.ok) {
    await loadStaff();
    showStatus('staffStatus', 'success', `✅ ${name} さんの情報を更新しました`);
  } else {
    showStatus('staffStatus', 'error', '更新に失敗しました');
  }
}

async function addStaff() {
  const name = document.getElementById('newName').value.trim();
  const email = document.getElementById('newEmail').value.trim();

  if (!name) {
    showStatus('staffStatus', 'error', '氏名を入力してください');
    return;
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/staff`, {
    method: 'POST',
    headers,
    body: JSON.stringify({ name, email: email || null })
  });

  if (res.ok) {
    document.getElementById('newName').value = '';
    document.getElementById('newEmail').value = '';
    await loadStaff();
    showStatus('staffStatus', 'success', `✅ ${name} さんを追加しました`);
    // 配置入力の選択肢も更新
  } else {
    showStatus('staffStatus', 'error', '追加に失敗しました');
  }
}

async function deleteStaff(id, name) {
  if (!confirm(`${name} さんを削除してもよいですか？`)) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/staff?id=eq.${id}`, {
    method: 'PATCH',
    headers,
    body: JSON.stringify({ active: false })
  });
  if (res.ok) {
    await loadStaff();
    showStatus('staffStatus', 'success', `${name} さんを削除しました`);
  }
}

// ========== 通知送信 ==========
async function previewNotify() {
  const date = document.getElementById('notifyDate').value;
  if (!date) return;

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/assignments?work_date=eq.${date}&order=id`,
    { headers }
  );
  const assignments = await res.json();

  const staffMap = {};
  staffList.forEach(s => { staffMap[s.id] = s; });

  const courseMap = {};
  courseList.forEach(c => { courseMap[c.id] = c; });

  // 添乗員ごとに通知内容をまとめる
  const staffNotifyMap = {}; // staffId -> [{role, course, ...}]

  assignments.forEach(a => {
    const course = courseMap[a.course_id];
    if (!course) return;

    const courseName = course.school_name + '　' + course.course_name;

    if (a.tokou_staff_id) {
      if (!staffNotifyMap[a.tokou_staff_id]) staffNotifyMap[a.tokou_staff_id] = [];
      staffNotifyMap[a.tokou_staff_id].push({ role: '登校便', courseName, course, assignId: a.id });
    }
    if (a.gekou_staff_id) {
      if (!staffNotifyMap[a.gekou_staff_id]) staffNotifyMap[a.gekou_staff_id] = [];
      staffNotifyMap[a.gekou_staff_id].push({ role: '下校便', courseName, course, assignId: a.id });
    }
    if (a.chukan_ari && a.chukan_staff_id) {
      if (!staffNotifyMap[a.chukan_staff_id]) staffNotifyMap[a.chukan_staff_id] = [];
      staffNotifyMap[a.chukan_staff_id].push({ role: '中間業務', courseName, course, assignId: a.id });
    }
  });

  const dateJp = formatDateJp(date);
  const notifyList = document.getElementById('notifyList');

  if (Object.keys(staffNotifyMap).length === 0) {
    notifyList.innerHTML = '<div style="color:#999; font-size:13px;">この日の配置がありません。先に配置を保存してください。</div>';
    document.getElementById('notifyPanel').style.display = 'block';
    return;
  }

  let html = '';
  // notifyDataをグローバルに保持
  window._notifyData = [];

  Object.entries(staffNotifyMap).forEach(([staffId, items]) => {
    const staff = staffMap[staffId];
    if (!staff) return;

    // 日報URL（複数業務をまとめてroleパラメータに）
    const tokouItem = items.find(i => i.role === '登校便');
    const gekouItem = items.find(i => i.role === '下校便');
    const mainItem = tokouItem || gekouItem || items[0];
    const mainCourse = mainItem.course;

    const roles = items.filter(i => i.role !== '中間業務').map(i => i.role);
    const roleParam = [...new Set(roles)].join(',');

    const params = new URLSearchParams({
      date: date,
      name: staff.name,
      school: mainCourse?.school_name || '',
      course: mainCourse?.course_name || '',
      role: roleParam || mainItem.role
    });
    const formUrl = NIPPO_FORM_URL + '?' + params.toString();

    const body = buildMailBody(staff.name, dateJp, items, formUrl);
    window._notifyData.push({ staff, body, subject: `【高尾輸送】${dateJp}のご担当業務について`, to: staff.email });

    html += `
      <div style="margin-bottom:16px; border:1px solid #d0d0d0; border-radius: 12px; overflow:hidden;">
        <div style="background:#4d7a5e; color:white; padding:8px 14px; font-weight:bold; font-size:13px;">
          📧 宛先：${staff.name}（${staff.email || 'メール未登録'}）
        </div>
        <div class="notify-preview">${body}</div>
        <div style="padding:8px 14px; background:#f8f9fa; display:flex; gap:8px; align-items:center;">
          ${staff.email
            ? `<a href="mailto:${staff.email}?subject=${encodeURIComponent(`【高尾輸送】${dateJp}のご担当業務について`)}&body=${encodeURIComponent(body)}"
                class="btn btn-notify btn-small">このメールを送る</a>`
            : '<span style="color:#c0392b; font-size:12px;">⚠ メールアドレス未登録</span>'}
          <span style="font-size:11px; color:#666;">
            日報リンク：<a href="${formUrl}" target="_blank" style="color:#6b9e7e;">${formUrl.slice(0,60)}...</a>
          </span>
        </div>
      </div>
    `;
  });

  notifyList.innerHTML = html;
  document.getElementById('notifyPanel').style.display = 'block';
}

function buildMailBody(name, dateJp, items, formUrl) {
  const lines = [
    `${name} 様`,
    '',
    `${dateJp}のご担当業務についてご連絡いたします。`,
    '',
    '【担当業務】',
    ...items.map(it => `  ・${it.role}：${it.courseName}`),
    '',
    '業務終了後、下記リンクより日報の入力をお願いします。',
    '（スマートフォンからもご入力いただけます）',
    '',
    '▼ 日報入力フォーム',
    formUrl,
    '',
    '---',
    '高尾輸送サービス',
  ];
  return lines.join('\n');
}

function sendAllNotify() {
  if (!window._notifyData || window._notifyData.length === 0) return;
  window._notifyData.forEach(({ staff, body, subject }) => {
    if (staff.email) {
      const link = `mailto:${staff.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.open(link, '_blank');
    }
  });
}

// ========== ユーティリティ ==========
function formatDateJp(dateStr) {
  const d = new Date(dateStr);
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status-bar ' + type;
  el.textContent = msg;
  if (type === 'success') {
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }
}

/* ===== CSV出力（配置表） ===== */
function exportAssignCSV() {
  const date = document.getElementById('workDate').value;
  const rows = [];
  const tbody = document.getElementById('assignBody');
  if (!tbody || tbody.children.length === 0) {
    alert('配置データがありません。先にデータを読み込んでください。');
    return;
  }
  // テーブルのヘッダー取得
  const headers = Array.from(document.querySelectorAll('#assignTable thead th')).map(th => th.textContent.trim());
  document.querySelectorAll('#assignBody tr').forEach(tr => {
    const row = {};
    const cells = tr.querySelectorAll('td');
    cells.forEach((td, i) => {
      const select = td.querySelector('select');
      const input  = td.querySelector('input');
      const checkbox = td.querySelector('input[type=checkbox]');
      let val = '';
      if (checkbox) val = checkbox.checked ? '✓' : '';
      else if (select) val = select.value;
      else if (input) val = input.value;
      else val = td.textContent.trim();
      if (headers[i]) row[headers[i]] = val;
    });
    if (Object.values(row).some(v => v)) rows.push(row);
  });
  if (rows.length === 0) { alert('出力するデータがありません'); return; }
  const BOM = '﻿';
  const cols = Object.keys(rows[0]);
  const lines = [cols.join(',')];
  rows.forEach(r => {
    lines.push(cols.map(c => {
      let v = String(r[c] ?? '');
      if (v.includes(',') || v.includes('"') || v.includes('\n')) v = '"' + v.replace(/"/g, '""') + '"';
      return v;
    }).join(','));
  });
  const blob = new Blob([BOM + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `配置表_${date||'未選択'}.csv`; a.click();
  URL.revokeObjectURL(url);
}

    try {
      let totpFactor = null;

      // 方法1: /auth/v1/user のfactorsフィールドで確認
      const uRes = await fetch(`${AUTH_URL}/user`, {
        headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
      });
      if (uRes.ok) {
        const userData = await uRes.json();
        const uf = Array.isArray(userData.factors) ? userData.factors : [];
        totpFactor = uf.find(f => f.factor_type === 'totp' && f.status === 'verified') || null;
      }

      // 方法2: /auth/v1/factors でも確認（方法1で見つからない場合のフォールバック）
      if (!totpFactor) {
        const fRes = await fetch(`${AUTH_URL}/factors`, {
          headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
        });
        if (fRes.ok) {
          const fData = await fRes.json();
          const ff = Array.isArray(fData) ? fData
                   : Array.isArray(fData?.factors) ? fData.factors : [];
          totpFactor = ff.find(f => f.factor_type === 'totp' && f.status === 'verified') || null;
        }
      }

      if (totpFactor) {
        // MFA必要 → セッションを一旦クリアし、仮トークンだけ返す
        _clearSession();
        return { ok: true, mfaRequired: true, factorId: totpFactor.id, tempToken: session.access_token };
      }
    } catch (_) {}

    // MFA不要
    const role = await _getRole(session.access_token);
    // ロール取得に失敗してもセッションは有効なので消去しない
    return { ok: true, role: role || null };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * MFA（TOTP）認証 — パスワード認証の続き
 */
async function signInMfa(factorId, code, tempToken) {
  try {
    const chRes = await fetch(`${AUTH_URL}/factors/${factorId}/challenge`, {
      method: 'POST',
      headers: _authHeaders(tempToken),
      body: JSON.stringify({})
    });
    if (!chRes.ok) return { ok: false, error: '認証チャレンジの作成に失敗しました' };
    const { id: challengeId } = await chRes.json();

    const vRes = await fetch(`${AUTH_URL}/factors/${factorId}/verify`, {
      method: 'POST',
      headers: _authHeaders(tempToken),
      body: JSON.stringify({ challenge_id: challengeId, code })
    });
    if (!vRes.ok) return { ok: false, error: 'コードが正しくありません。認証アプリを確認してください。' };

    const session = _saveSession(await vRes.json());
    const role = await _getRole(session.access_token);
    // ロール取得に失敗してもセッションは有効なので消去しない
    return { ok: true, role: role || null };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**

async function signOut() {

/**
 * パスワード変更（ログイン中のユーザー自身）
 */
async function changePassword(newPassword) {
  const session = _getSession();
  if (!session?.access_token) return { ok: false, error: 'セッションが無効です' };
  try {
    const res = await fetch(`${AUTH_URL}/user`, {
      method: 'PUT',
      headers: _authHeaders(session.access_token),
      body: JSON.stringify({ password: newPassword })
    });
    if (res.ok) return { ok: true };
    const d = await res.json();
    return { ok: false, error: d.msg || d.message || 'パスワード変更に失敗しました' };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * TOTP登録開始（QRコードURIを返す）
 */
async function enrollTotp() {
  let session = _getSession();
  if (!session?.access_token) return { ok: false, error: 'セッションが無効です' };

  // セッションの有効期限が近い場合はリフレッシュ
  if (_isExpired(session)) {
    session = await _refresh(session);
    if (!session) return { ok: false, error: 'セッションの更新に失敗しました。再ログインしてください。' };
  }

  try {
    // 未確認（unverified）のTOTPファクターのみ削除（確認済みのものは絶対に削除しない）
    const listRes = await fetch(`${AUTH_URL}/factors`, {
      headers: _authHeaders(session.access_token)
    });
    if (listRes.ok) {
      const factors = await listRes.json();
      if (Array.isArray(factors)) {
        // 確認済みファクターが既にある場合はエラーを返す
        const verified = factors.find(f => f.factor_type === 'totp' && f.status === 'verified');
        if (verified) {
          return { ok: false, error: '二段階認証はすでに設定済みです。一度「解除する」してから再設定してください。' };
        }
        // 未確認ファクターのみ削除
        for (const f of factors) {
          if (f.factor_type === 'totp' && f.status === 'unverified') {
            await fetch(`${AUTH_URL}/factors/${f.id}`, {
              method: 'DELETE',
              headers: _authHeaders(session.access_token)
            });
          }
        }
      }
    }

    const res = await fetch(`${AUTH_URL}/factors`, {
      method: 'POST',
      headers: _authHeaders(session.access_token),
      body: JSON.stringify({ factor_type: 'totp', friendly_name: '高尾輸送サービス', issuer: '高尾輸送サービス' })
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const msg = errData.msg || errData.message || errData.error_description || errData.code || `エラー(${res.status})`;
      return { ok: false, error: 'QRコードの生成に失敗しました: ' + msg };
    }
    const d = await res.json();
    return { ok: true, factorId: d.id, totpUri: d.totp?.uri, secret: d.totp?.secret };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * TOTP登録確認（初回コード検証）
 */
async function verifyTotpEnrollment(factorId, code) {
  const session = _getSession();
  if (!session?.access_token) return { ok: false, error: 'セッションが無効です' };
  try {
    const chRes = await fetch(`${AUTH_URL}/factors/${factorId}/challenge`, {
      method: 'POST', headers: _authHeaders(session.access_token), body: JSON.stringify({})
    });
    if (!chRes.ok) return { ok: false, error: 'チャレンジ作成に失敗しました' };
    const { id: challengeId } = await chRes.json();

    const vRes = await fetch(`${AUTH_URL}/factors/${factorId}/verify`, {
      method: 'POST',
      headers: _authHeaders(session.access_token),
      body: JSON.stringify({ challenge_id: challengeId, code })
    });
    if (!vRes.ok) return { ok: false, error: 'コードが正しくありません。もう一度お試しください。' };
    _saveSession(await vRes.json());
    return { ok: true };
  } catch (e) {
    return { ok: false, error: 'ネットワークエラー: ' + e.message };
  }
}

/**
 * 登録済みTOTPファクター一覧
 */
async function getEnrolledFactors() {
  const session = _getSession();
  if (!session?.access_token) return [];
  try {

      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
    });
    if (!res.ok) return [];

  } catch { return []; }
}

/**
 * TOTP解除
 */
async function unenrollTotp(factorId) {
  const session = _getSession();
  if (!session?.access_token) return { ok: false };
  try {
    const res = await fetch(`${AUTH_URL}/factors/${factorId}`, {
      method: 'DELETE',
      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${session.access_token}` }
    });
    return { ok: res.ok };
  } catch { return { ok: false }; }
}

/**
 * 認証チェック（各ページのDOMContentLoaded前に呼ぶ）
 */
async function initAuth(allowedRoles) {
  document.documentElement.style.visibility = 'hidden';
  try {
    let session = _getSession();
    if (!session) { _redirectLogin(); return false; }
    if (_isExpired(session)) {
      session = await _refresh(session);
      if (!session) { _clearSession(); _redirectLogin(); return false; }
    }
    const role = await _getRole(session.access_token);
    if (!role || !allowedRoles.includes(role)) {
      _showDenied(role);
      document.documentElement.style.visibility = 'visible';
      return false;
    }
    _injectUserInfo(session.email, role);
    _injectModals();
    document.documentElement.style.visibility = 'visible';
    return true;
  } catch (err) {
    console.error('[auth.js] initAuth error:', err);
    document.documentElement.style.visibility = 'visible';
    return false;
  }
}

/* ===================== パスワード変更 ===================== */

function showPasswordChangeModal() {
  _injectModals();
  document.getElementById('_tm_pw_new').value = '';
  document.getElementById('_tm_pw_conf').value = '';
  document.getElementById('_tm_pw_err').style.display = 'none';
  document.getElementById('_tm_pw_ok').style.display = 'none';
  document.getElementById('_tm_pw').classList.add('open');
  setTimeout(() => document.getElementById('_tm_pw_new').focus(), 100);
}

function closePasswordChangeModal() {
  document.getElementById('_tm_pw').classList.remove('open');
}

async function _doChangePassword() {
  const np   = document.getElementById('_tm_pw_new').value;
  const conf = document.getElementById('_tm_pw_conf').value;
  const err  = document.getElementById('_tm_pw_err');
  const ok   = document.getElementById('_tm_pw_ok');
  const btn  = document.getElementById('_tm_pw_btn');
  err.style.display = 'none';
  ok.style.display = 'none';
  if (np.length < 8) { err.textContent = 'パスワードは8文字以上で設定してください'; err.style.display = 'block'; return; }
  if (np !== conf)   { err.textContent = 'パスワードが一致しません'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '変更中…';
  const result = await changePassword(np);
  btn.disabled = false; btn.textContent = '変更する';
  if (result.ok) {
    ok.style.display = 'block';
    document.getElementById('_tm_pw_new').value = '';
    document.getElementById('_tm_pw_conf').value = '';
    setTimeout(() => closePasswordChangeModal(), 2000);
  } else {
    err.textContent = result.error; err.style.display = 'block';
  }
}

  const startBtn  = document.getElementById('_tm_totp_start_btn');
  const disableBtn = document.getElementById('_tm_totp_disable_btn');
  status.textContent = '状態を確認中...';
  startBtn.style.display = 'none';
  disableBtn.style.display = 'none';

  const factors = await getEnrolledFactors();
  if (factors.length > 0) {
    _totpFactorId = factors[0].id;
    status.textContent = '✅ 二段階認証は有効です。認証アプリが設定されています。';
    disableBtn.style.display = 'block';
  } else {
    status.textContent = '二段階認証は現在無効です。設定するとログイン時にアプリのコード入力が必要になります。';
    startBtn.style.display = 'block';
  }
}

function closeTotpSetupModal() {
  document.getElementById('_tm_totp').classList.remove('open');
}

function _showTotpStep0() {
  ['_tm_totp_s0','_tm_totp_s1','_tm_totp_s2'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === 0);
  });
}
function _showTotpStep1() {
  ['_tm_totp_s0','_tm_totp_s1','_tm_totp_s2'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === 1);
  });
}
function _showTotpStep2() {
  document.getElementById('_tm_totp_code').value = '';
  ['_tm_totp_s0','_tm_totp_s1','_tm_totp_s2'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === 2);
  });
  setTimeout(() => document.getElementById('_tm_totp_code').focus(), 100);
}

async function _startTotpSetup() {
  const startBtn = document.getElementById('_tm_totp_start_btn');
  const err = document.getElementById('_tm_totp_err');
  err.style.display = 'none';
  startBtn.disabled = true; startBtn.textContent = 'QRコード生成中…';

  const result = await enrollTotp();
  startBtn.disabled = false; startBtn.textContent = 'QRコードを表示して設定開始';
  if (!result.ok) { err.textContent = result.error; err.style.display = 'block'; return; }

  _totpFactorId = result.factorId;
  document.getElementById('_tm_totp_secret').textContent = result.secret || '';

  // QRコード描画
  const canvas = document.getElementById('_tm_qr_canvas');
  canvas.innerHTML = '';
  _loadQRLib(() => {
    new QRCode(canvas, { text: result.totpUri, width: 200, height: 200,
      colorDark: '#2d4a36', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  });

  _showTotpStep1();
}

async function _verifyTotpSetup() {
  const code = document.getElementById('_tm_totp_code').value.replace(/\D/g, '');
  const err  = document.getElementById('_tm_totp_err');
  const ok   = document.getElementById('_tm_totp_ok');
  const btn  = document.getElementById('_tm_totp_verify_btn');
  err.style.display = 'none';
  if (code.length !== 6) { err.textContent = '6桁のコードを入力してください'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '確認中…';
  const result = await verifyTotpEnrollment(_totpFactorId, code);
  btn.disabled = false; btn.textContent = '設定を完了する';
  if (result.ok) {
    ok.textContent = '✅ 二段階認証の設定が完了しました！次回ログインからコード入力が必要になります。';
    ok.style.display = 'block';
    _showTotpStep0();
    document.getElementById('_tm_totp_status').textContent = '✅ 二段階認証は有効です。認証アプリが設定されています。';
    document.getElementById('_tm_totp_start_btn').style.display = 'none';
    document.getElementById('_tm_totp_disable_btn').style.display = 'block';
  } else {
    err.textContent = result.error; err.style.display = 'block';
  }
}

async function _disableTotp() {
  if (!confirm('二段階認証を解除しますか？\nログイン時のコード入力が不要になります。')) return;
  const result = await unenrollTotp(_totpFactorId);
  const err = document.getElementById('_tm_totp_err');
  const ok  = document.getElementById('_tm_totp_ok');
  if (result.ok) {
    ok.textContent = '二段階認証を解除しました。';
    ok.style.display = 'block';
    document.getElementById('_tm_totp_status').textContent = '二段階認証は現在無効です。';
    document.getElementById('_tm_totp_start_btn').style.display = 'block';
    document.getElementById('_tm_totp_disable_btn').style.display = 'none';
  } else {
    err.textContent = '解除に失敗しました。'; err.style.display = 'block';
  }
}

function _loadQRLib(cb) {
  if (window.QRCode) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload = cb;
  document.head.appendChild(s);
}




</script>
